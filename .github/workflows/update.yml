name: Update Iranian Streaming Lists

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dnsutils jq python3

      - name: Generate Iranian streaming lists
        run: |
          chmod +x scripts/build-iran-streaming.sh
          ./scripts/build-iran-streaming.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add iran-streaming-domains.txt iran-streaming-hosts.txt iran-streaming-urls.txt iran-streaming-ips.txt iran-streaming-prefixes.txt mikrotik-iran-streaming-address-list.rsc

          if git diff --cached --quiet; then
            echo "No Iranian streaming list changes"
          else
            git commit -m "Automatic Iranian streaming route list update"
            git push
          fi
