name: Update Filimo Lists

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dnsutils jq

      - name: Generate Filimo lists
        run: |
          chmod +x scripts/build-filimo.sh
          ./scripts/build-filimo.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add filimo-domains.txt filimo-hosts.txt filimo-ips.txt filimo-prefixes.txt mikrotik-filimo-address-list.rsc

          if git diff --cached --quiet; then
            echo "No Filimo list changes"
          else
            git commit -m "Automatic Filimo route list update"
            git push
          fi
